<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>StudyLoop</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d0f0e">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyLoop">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0d0f0e;
--surface:#141714;
--border:rgba(255,255,255,0.07);
--accent:#b8f07a;
--accent-dim:rgba(184,240,122,0.15);
--danger:#f07a7a;
--text-hi:#eef0ec;
--text-lo:#6b7068;
--radius:18px;
--font-display:'DM Serif Display',serif;
--font-mono:'DM Mono',monospace;
}

body{
background:var(--bg);
color:var(--text-hi);
font-family:var(--font-mono);
margin:0;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:40px;
padding:30px 24px;
box-sizing:border-box;
}

.header h1{
font-family:var(--font-display);
font-size:32px;
font-weight:400;
margin:0;
}

.header span{
color:var(--accent);
font-style:italic;
}

.top-bar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
}

.icon-btn{
background:var(--surface);
border:1px solid var(--border);
color:var(--text-hi);
width:42px;
height:42px;
border-radius:12px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.icon-btn:active{
opacity:.7;
}

.ring-wrap{
position:relative;
width:200px;
height:200px;
}

svg{
transform:rotate(-90deg);
width:100%;
height:100%;
}

.track{
fill:none;
stroke:var(--border);
stroke-width:4;
}

.progress{
fill:none;
stroke:var(--accent);
stroke-width:4;
stroke-dasharray:565;
stroke-dashoffset:565;
transition:stroke-dashoffset .1s;
}

.ring-info{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#time{
font-size:22px;
}

#status{
font-size:9px;
color:var(--text-lo);
margin-top:5px;
}

.speed-control{
display:flex;
align-items:center;
gap:10px;
font-size:10px;
color:var(--text-lo);
}

.speed-control input{
width:120px;
}

.btn-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
width:100%;
max-width:320px;
}

.btn{
background:var(--surface);
border:1px solid var(--border);
color:var(--text-hi);
padding:20px;
border-radius:var(--radius);
cursor:pointer;
text-transform:uppercase;
font-size:10px;
letter-spacing:1px;
}

.btn-rec{
color:var(--danger);
border-color:rgba(240,122,122,.3);
}

.btn-play{
color:var(--accent);
border-color:var(--accent-dim);
}

.btn:disabled{
opacity:.2;
}

</style>

</head>

<body>

<div class="top-bar">

<button class="icon-btn" onclick="saveAudio()" id="saveBtn" disabled>💾</button>

<button class="icon-btn" onclick="uploadInput.click()">⬆️</button>

</div>

<input type="file" id="uploadInput" accept="audio/*" capture style="display:none">

<div class="header">
<h1>Study<span>Loop</span></h1>
</div>

<div class="ring-wrap">

<svg>

<circle class="track" cx="100" cy="100" r="90"></circle>
<circle id="prog" class="progress" cx="100" cy="100" r="90"></circle>

</svg>

<div class="ring-info">

<div id="time">0:00</div>
<div id="status">READY</div>

</div>

</div>

<div class="speed-control">

<label>Speed</label>

<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<span id="speedLabel">1.0×</span>

</div>

<div class="btn-grid">

<button class="btn btn-rec" onclick="toggleRec()" id="recBtn">Record</button>

<button class="btn btn-play" onclick="togglePlay()" id="playBtn" disabled>Play</button>

</div>

<script>

let rec
let chunks=[]
let audio=null
let recordedBlob=null
let timer
let sec=0

const prog=document.getElementById("prog")
const time=document.getElementById("time")
const status=document.getElementById("status")
const speedSlider=document.getElementById("speed")
const speedLabel=document.getElementById("speedLabel")
const uploadInput=document.getElementById("uploadInput")

function updateTimer(){

sec++

time.innerText=Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0")

prog.style.strokeDashoffset=565-(565*(sec/300))

}

async function toggleRec(){

if(rec && rec.state==="recording"){

rec.stop()

clearInterval(timer)

status.innerText="READY"

document.getElementById("recBtn").innerText="Record"

}else{

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

rec=new MediaRecorder(stream)

chunks=[]

rec.ondataavailable=e=>{
if(e.data.size>0) chunks.push(e.data)
}

rec.onstop=()=>{

recordedBlob=new Blob(chunks)

const url=URL.createObjectURL(recordedBlob)

audio=new Audio(url)

audio.loop=true
audio.playbackRate=parseFloat(speedSlider.value)

document.getElementById("playBtn").disabled=false
document.getElementById("saveBtn").disabled=false

}

rec.start()

sec=0

status.innerText="RECORDING"

document.getElementById("recBtn").innerText="Stop"

timer=setInterval(updateTimer,1000)

}

}

function togglePlay(){

if(!audio) return

if(audio.paused){

audio.play()

status.innerText="LOOPING"

document.getElementById("playBtn").innerText="Pause"

}else{

audio.pause()

status.innerText="PAUSED"

document.getElementById("playBtn").innerText="Play"

}

}

function saveAudio(){

if(!recordedBlob) return

const url=URL.createObjectURL(recordedBlob)

const a=document.createElement("a")

a.href=url
a.download="studyloop-recording.m4a"

document.body.appendChild(a)

a.click()

document.body.removeChild(a)

}

uploadInput.addEventListener("change",function(){

const file=this.files[0]

if(!file) return

const url=URL.createObjectURL(file)

audio=new Audio(url)

audio.loop=true
audio.playbackRate=parseFloat(speedSlider.value)

document.getElementById("playBtn").disabled=false

status.innerText="AUDIO LOADED"

})

speedSlider.addEventListener("input",()=>{

const rate=parseFloat(speedSlider.value)

speedLabel.innerText=rate.toFixed(1)+"×"

if(audio) audio.playbackRate=rate

})

</script>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("service-worker.js")

})

}

</script>

</body>
</html>
